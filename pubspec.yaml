name: pactstream
description: PactStream — La capa de confianza de la construcción europea.
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"
  flutter: ">=3.27.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Routing
  go_router: ^14.7.1

  # Backend
  supabase_flutter: ^2.8.0

  # UI
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.16
  cached_network_image: ^3.4.1
  flutter_animate: ^4.5.2

  # Utils
  intl: ^0.20.2 # versión pinned por flutter_localizations (Flutter 3.41+)
  flutter_dotenv: ^5.2.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  uuid: ^4.5.1
  collection: ^1.19.0

  # Forms
  reactive_forms: ^17.0.1

  # Native features
  image_picker: ^1.1.2
  geolocator: ^13.0.2
  permission_handler: ^11.3.1
  device_info_plus: ^11.2.2
  package_info_plus: ^8.1.2
  url_launcher: ^6.3.1

  # Storage local
  shared_preferences: ^2.3.4
  flutter_secure_storage: ^9.2.4

  # Crypto (para hashes SHA-256 de evidencias)
  crypto: ^3.0.6

  # PDF (generación + preview del contrato firmado)
  pdf: ^3.11.0
  printing: ^5.13.0

  # Logging y errores
  logger: ^2.5.0
  sentry_flutter: ^8.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^2.6.3

  # Code generation
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.0

  # Testing
  mocktail: ^1.0.4
  golden_toolkit: ^0.15.0
  patrol: ^3.13.2

flutter:
  uses-material-design: true
  generate: true

  # .env debe declararse como asset para que flutter_dotenv lo cargue en
  # runtime. Las fuentes Nunito vienen de google_fonts (descarga en runtime).
  # Antes de producción, descargar los .ttf y declararlos localmente para
  # builds offline.
  assets:
    - .env
    - assets/images/pactstream_logo.png
